# ==========================================================================
#  EXPERIMENT: Tree-HDP v2 -- realistic-data test (fixed signatures)
# ==========================================================================
#
#  Model structure : fixed-sig-v2     Git tag: fixed-sig-v2
#
#  PURPOSE
#    The final fixed-signature experiment.  Earlier experiments used a
#    deliberately clean regime (deep test forests, lam ~3250, no sparsity,
#    no dropout) to isolate one effect at a time.  This config instead
#    calibrates the simulator to resemble the real single-cell data the
#    model is ultimately for (the LeoMed cohort, modelled on the
#    Borgsmueller dataset: ~187 cells across ~10 tumours, ~970 mutations
#    per sample, sparse and over-dispersed).
#
#  WHAT IS "REALISTIC" HERE
#    - Shallow trees.  Real data merges multiple cells into one node, so
#      trees are shallow with few nodes (here ~3-7 nodes/tree, depth 2-3)
#      rather than the deep test forests.  30 trees -> ~120-180 nodes,
#      close to the ~187 cells of the reference dataset.
#    - Realistic counts.  lam = 970 (the reference dataset's per-sample
#      mean) with per-edge branch lengths spanning 300-2000, and
#      nb_dispersion = 2.0 -- real mutation burden is over-dispersed,
#      unlike the Poisson (nb_dispersion: none) used in recent runs.
#    - Cohort sparsity.  activity_sparsity = 0.4 hard-zeros 4 of the 10
#      signatures in the cohort baseline -> cohort true_K = 6.  Real
#      tumours use only a handful of signatures, not all K.
#    - Within-tree support change.  signature_dropout = 0.1 lets an
#      active signature switch off in a child (10% per signature per
#      node).  So the active support is NOT constant down a tree and
#      per-node true_K varies; "true_K = 6" is the cohort figure.
#    - Real COSMIC signatures.  10 actual COSMIC SBS profiles (GRCh37)
#      are loaded directly: SBS1, SBS4, SBS5, SBS36, SBS37, SBS40a,
#      SBS44, SBS92, SBS105, SBS112.  These span the full COSMIC
#      peakedness range (entropy ~1.9 for the sharp SBS1 to ~4.3 for
#      the flat SBS5/SBS40a) and carry real correlation structure --
#      unlike synthesized signatures, which came out uniformly flat.
#
#  CAVEATS / THINGS TO CHECK IN THE GENERATED DATA
#    - signature_dropout has not been exercised before this experiment;
#      every prior run used dropout = 0.  When inspecting the generated
#      data, verify the dropout behaves as intended: some nodes should
#      have FEWER active signatures than their parent, and no node should
#      lose all signatures.
#    - This is a sparse regime, so per the alpha_0 / sigma_0 sweeps the
#      global sigma is not cleanly identified (the activity walk lives on
#      a reduced-dimensional simplex).  The recovery target of this
#      experiment is the per-node ACTIVITIES (e_level vs true_activities),
#      not sigma.  sigma is not a generator parameter and cannot be
#      validated here.
#    - alpha_0 is kept moderate (= K, i.e. Dir(1.0)) so that sparsity
#      comes ONLY from activity_sparsity, not also from a sparse baseline
#      draw.  One sparsity mechanism, controlled, with known true_K.
#
#  HOW TO REPRODUCE
#    git checkout fixed-sig-v2
#    python scripts/generate_data.py  --config configs/config_v2_realistic.yaml
#    python scripts/run_inference.py  --config configs/config_v2_realistic.yaml
#
# ==========================================================================

experiment_name: config_v2_realistic
git_tag: fixed-sig-v2

# ── Data generation ─────────────────────────────────────────────────────────
simulation:
  seed: 42
  results_dir: ../data/
  make_plots: true

  # Activity random walk e_j ~ Dir(alpha * e_parent) in the generator.
  alpha: 15.0

  # Cohort baseline e_0 ~ Dir((alpha_0 / K) * 1_K).
  # alpha_0 = 10 with K = 10 -> Dir(1.0): a non-degenerate baseline, so
  # cohort sparsity comes only from activity_sparsity below, not from a
  # self-concentrating baseline draw.
  alpha_0: 10.0

  # Per-node mutation-count model. lam = 970 matches the reference
  # dataset's per-sample mean; nb_dispersion = 2.0 gives the realistic
  # over-dispersed burden.
  lam: 970
  nb_dispersion: 2.0

  # Cohort sparsity: hard-zero 40% of signatures in the baseline.
  # K = 10 -> cohort true_K = 6.
  activity_sparsity: 0.4

  # Within-tree support change: an active signature may switch off in a
  # child with probability 0.1.  Per-node true_K therefore varies; 6 is
  # the cohort-level figure.
  signature_dropout: 0.1

  # ── Signatures ────────────────────────────────────────────────────────────
  signatures:
    source: load                # synthesize | load
    # correlation: ignored when source == load (real signatures carry
    # their own correlation structure).
    path: ../COSMIC_sig/cosmic_signatures.csv   # 10 real COSMIC SBS signatures (GRCh37)
    num_signatures: 10          # K

  # ── Random phylogenetic forest ────────────────────────────────────────────
  # Shallow trees: real data merges cells into nodes, so few nodes per
  # tree. 30 trees * ~3-7 nodes ~= 120-180 nodes total.
  forest:
    num_trees: 30
    min_leaves: 2
    max_leaves: 4
    min_branch_length: 300      # per-edge count mean, lower bound
    max_branch_length: 2000     # per-edge count mean, upper bound

# ── Inference ───────────────────────────────────────────────────────────────
inference:
  data:
    count_matrix: ../data/config_v2_realistic/mutation_count_matrix.csv
    newick_string: ../data/config_v2_realistic/newick_string.nwk
    tree_edges: ../data/config_v2_realistic/tree_edges.csv
    fixed_signatures: ../data/config_v2_realistic/fixed_signatures.csv
    true_activities: ../data/config_v2_realistic/true_activities.csv
    ground_truth_params: ../data/config_v2_realistic/ground_truth_params.json

  priors:
    # Prior on the logistic-normal walk scale sigma.
    sigma_prior: LogNorm
    sigma_prior_parm:
      mu: 0.0
      sigma: 1.0
    # Root-baseline std eta_root ~ Normal(0, sigma_0^2).
    # Fixed at 2.0 -- verified insensitive on a plateau in both the
    # non-sparse and sparse sigma_0 sweeps (sigma_0 = 1 is too tight).
    sigma_0: 2.0
    # NOTE: there is no `eps` in v2 -- the reparameterization removes it.

  # NUTS sampler settings
  draws: 1000
  tune: 1000
  chains: 4
  cores: 4
  target_accept: 0.9
  max_treedepth: 10

  results_dir: ../results/